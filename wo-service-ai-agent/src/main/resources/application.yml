server:
  port: 8084

spring:
  application:
    name: wo-service-ai-agent
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:192.168.213.100}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:wo_system}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:192.168.213.100}
      port: ${REDIS_PORT:6379}
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:192.168.213.100:8848}
      config:
        server-addr: ${NACOS_SERVER_ADDR:192.168.213.100:8848}
  config:
    import: optional:nacos:wo-service-ai-agent.yml

dashscope:
  api-key: ${DASHSCOPE_API_KEY:sk-placeholder}

milvus:
  host: ${MILVUS_HOST:192.168.213.100}
  port: ${MILVUS_PORT:19530}
  collection: ${MILVUS_COLLECTION:wo_knowledge_vectors}

nacos:
  remote:
    client:
      grpc:
        server:
          ip: ${NACOS_REMOTE_GRPC_IP:192.168.213.100}

agent:
  model: qwen-plus
  max-tokens: 500
  temperature: 0.7

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

management:
  endpoints:
    web:
      exposure:
        include: health,info
