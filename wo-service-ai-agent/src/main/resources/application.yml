server:
  port: 8084

spring:
  application:
    name: wo-service-ai-agent
  datasource:
    url: jdbc:mysql://192.168.213.100:3306/wo_system?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: 192.168.213.100
      port: 6379
  cloud:
    nacos:
      discovery:
        server-addr: 192.168.213.100:8848
      config:
        server-addr: 192.168.213.100:8848
  config:
    import: optional:nacos:wo-service-ai-agent.yml

dashscope:
  api-key: ${DASHSCOPE_API_KEY:sk-placeholder}

nacos:
  remote:
    client:
      grpc:
        server:
          ip: 192.168.213.100

agent:
  model: qwen-plus
  max-tokens: 500
  temperature: 0.7

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

management:
  endpoints:
    web:
      exposure:
        include: health,info
