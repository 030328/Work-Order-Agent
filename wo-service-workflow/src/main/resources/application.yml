server:
  port: 8083

spring:
  application:
    name: wo-service-workflow
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/wo_system?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: 127.0.0.1
      port: 6379
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
  config:
    import: optional:nacos:wo-service-workflow.yml

rocketmq:
  name-server: 127.0.0.1:9876
  producer:
    group: workflow-producer-group

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

management:
  endpoints:
    web:
      exposure:
        include: health,info
