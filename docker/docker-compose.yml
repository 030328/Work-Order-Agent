version: '3.8'

services:
  # ==================== Infrastructure ====================
  mysql:
    image: mysql:8
    container_name: wo-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: wo_system
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: wo-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  elasticsearch:
    image: elasticsearch:8.12.0
    container_name: wo-elasticsearch
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - es-data:/usr/share/elasticsearch/data

  milvus:
    image: milvusdb/milvus:v2.4.22
    container_name: wo-milvus
    ports:
      - "19530:19530"
    environment:
      ETCD_USE_EMBED: "true"
      COMMON_STORAGETYPE: local
    volumes:
      - milvus-data:/var/lib/milvus

  nacos:
    image: nacos/nacos-server:v2.1.0-slim
    container_name: wo-nacos
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    environment:
      MODE: standalone
      NACOS_SERVER_IP: ${NACOS_SERVER_IP:-192.168.213.100}

  rocketmq-namesrv:
    image: apache/rocketmq:5.1.4
    container_name: wo-rocketmq-namesrv
    ports:
      - "9876:9876"
    command: sh mqnamesrv
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9876'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  rocketmq-broker:
    image: apache/rocketmq:5.1.4
    container_name: wo-rocketmq-broker
    ports:
      - "10911:10911"
      - "10909:10909"
      - "10912:10912"
    command: >
      sh -c "{ echo brokerClusterName=DefaultCluster;
      echo brokerName=broker-a;
      echo brokerId=0;
      echo brokerIP1=$${ROCKETMQ_BROKER_IP};
      echo brokerIP2=$${ROCKETMQ_BROKER_IP};
      echo listenPort=10911;
      echo namesrvAddr=rocketmq-namesrv:9876;
      echo autoCreateTopicEnable=true;
      echo brokerRole=ASYNC_MASTER;
      echo flushDiskType=ASYNC_FLUSH;
      } > /tmp/broker.conf
      && cat /tmp/broker.conf
      && sh mqbroker -c /tmp/broker.conf"
    environment:
      JAVA_OPT_EXT: "-Xms256m -Xmx256m"
      NAMESRV_ADDR: "rocketmq-namesrv:9876"
      ROCKETMQ_BROKER_IP: ${ROCKETMQ_BROKER_IP:-192.168.213.100}
    depends_on:
      rocketmq-namesrv:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/10911'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ==================== Application Services ====================
  wo-gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.gateway
    container_name: wo-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR: nacos:8848
    depends_on:
      nacos:
        condition: service_started

  wo-service-user:
    build:
      context: ..
      dockerfile: docker/Dockerfile.user
    container_name: wo-service-user
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/wo_system?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
      SPRING_DATA_REDIS_HOST: redis
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR: nacos:8848
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  wo-service-workorder:
    build:
      context: ..
      dockerfile: docker/Dockerfile.workorder
    container_name: wo-service-workorder
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/wo_system?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
      SPRING_DATA_REDIS_HOST: redis
      SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR: nacos:8848
      ROCKETMQ_NAME_SERVER: rocketmq-namesrv:9876
      WORKORDER_EVENT_MQ_ENABLED: "true"
    depends_on:
      mysql:
        condition: service_healthy
      elasticsearch:
        condition: service_started

  wo-service-workflow:
    build:
      context: ..
      dockerfile: docker/Dockerfile.workflow
    container_name: wo-service-workflow
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/wo_system?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
      SPRING_DATA_REDIS_HOST: redis
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR: nacos:8848
      ROCKETMQ_NAME_SERVER: rocketmq-namesrv:9876
    depends_on:
      mysql:
        condition: service_healthy

  wo-service-ai-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ai-agent
    container_name: wo-service-ai-agent
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/wo_system?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
      SPRING_DATA_REDIS_HOST: redis
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR: nacos:8848
      MILVUS_HOST: milvus
      ROCKETMQ_NAME_SERVER: rocketmq-namesrv:9876
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
    depends_on:
      mysql:
        condition: service_healthy
      milvus:
        condition: service_started

  # ==================== Monitoring ====================
  kibana:
    image: kibana:8.12.0
    container_name: wo-kibana
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    depends_on:
      - elasticsearch

  # 以下镜像需要 docker pull 预下载
  prometheus:
    image: prom/prometheus:v2.49.0
    container_name: wo-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:10.3.1
    container_name: wo-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin123

volumes:
  mysql-data:
  redis-data:
  es-data:
  milvus-data:
