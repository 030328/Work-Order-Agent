server:
  port: 8081

spring:
  application:
    name: wo-service-user
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:192.168.213.100}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:wo_system}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:192.168.213.100}
      port: ${REDIS_PORT:6379}
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:192.168.213.100:8848}
      config:
        server-addr: ${NACOS_SERVER_ADDR:192.168.213.100:8848}
  config:
    import: optional:nacos:wo-service-user.yml

# Sentinel 日志配置
sentinel:
  log:
    dir: logs/wo-service-user/sentinel

nacos:
  remote:
    client:
      grpc:
        server:
          ip: ${NACOS_REMOTE_GRPC_IP:192.168.213.100}

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

management:
  endpoints:
    web:
      exposure:
        include: health,info
